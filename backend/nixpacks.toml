# Nixpacks build spec for the Bot backend on Railway.
#
# Pinned to python313 because Railway's current Nixpkgs revision
# (bc8f8d1...) doesn't expose a `python314` attribute yet. The project is
# compatible with 3.13 (no 3.14-only language features). Revisit once
# Railway's nixpacks image upgrades.

[phases.setup]
nixPkgs = ["python313", "uv"]

[phases.install]
cmds = ["uv sync --frozen"]

[start]
cmd = "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
