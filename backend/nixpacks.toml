# Nixpacks build spec for the Bot backend on Railway.
#
# Python 3.14 + uv. Railway's nixpacks detects pyproject.toml, but we pin the
# interpreter version explicitly so builds don't silently fall back to 3.12.
# If Railway's Nix channel doesn't have 3.14 yet, pin this to the latest
# available (e.g. "python313") and loosen requires-python in pyproject.toml.

[phases.setup]
nixPkgs = ["python314", "uv"]

[phases.install]
cmds = ["uv sync --frozen"]

[start]
cmd = "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
